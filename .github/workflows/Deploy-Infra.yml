name: Deploy CloudFormation Stacks

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        required: true
        default: dev
        options:
          - dev
          - qa
          - prod

      deploy_all:
        description: Deploy all stacks
        type: boolean
        required: true
        default: false

      create_dummy_zip:
        description: Create and upload dummy Lambda zip
        type: boolean
        required: true
        default: true

      deploy_storage:
        description: Deploy 01-storage.yaml
        type: boolean
        required: true
        default: false

      deploy_data:
        description: Deploy 02-data.yaml
        type: boolean
        required: true
        default: false

      deploy_auth:
        description: Deploy 03-auth.yaml
        type: boolean
        required: true
        default: false

      deploy_messaging:
        description: Deploy 04-messaging.yaml
        type: boolean
        required: true
        default: false

      deploy_lambdas_events:
        description: Deploy 05-lambdas-events.yaml
        type: boolean
        required: true
        default: false

      deploy_lambdas_registrations:
        description: Deploy 06-lambdas-registrations.yaml
        type: boolean
        required: true
        default: false

      deploy_lambdas_reports:
        description: Deploy 07-lambdas-reports.yaml
        type: boolean
        required: true
        default: false

      deploy_lambdas_notifications:
        description: Deploy 08-lambdas-notifications.yaml
        type: boolean
        required: true
        default: false

      deploy_api:
        description: Deploy 09-api.yaml
        type: boolean
        required: true
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  storage:
    name: Deploy 01-storage
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    if: ${{ inputs.deploy_all || inputs.deploy_storage }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      ENVIRONMENT: ${{ inputs.environment }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate template
        run: |
          aws cloudformation validate-template \
            --template-body file://infra/01-storage.yaml \
            --region "$AWS_REGION"

      - name: Deploy storage stack
        shell: bash
        run: |
          aws cloudformation deploy \
            --template-file file://infra/01-storage.yaml \
            --stack-name "${PROJECT_NAME}-${ENVIRONMENT}-storage" \
            --parameter-overrides ProjectName="${PROJECT_NAME}" Environment="${ENVIRONMENT}" \
            --region "${AWS_REGION}"

  dummy-lambda-artifact:
    name: Create dummy Lambda artifact
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs:
      - storage
    if: >-
      ${{
        always() &&
        inputs.create_dummy_zip &&
        (needs.storage.result == 'success' || needs.storage.result == 'skipped')
      }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION  }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      ENVIRONMENT: ${{ inputs.environment }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      LAMBDA_ARTIFACTS_BUCKET: ${{ vars.LAMBDA_ARTIFACTS_BUCKET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create and upload dummy Lambda zip
        shell: bash
        run: |
          set -euo pipefail

          echo "Using bucket: ${LAMBDA_ARTIFACTS_BUCKET}"

          mkdir -p .build/dummy-lambda

          cat > .build/dummy-lambda/index.py <<'PY'
          import json

          def handler(event, context):
              return {
                  "message": "Hola, esto es un mensaje de prueba "
              }
          PY

          cd .build/dummy-lambda
          zip -r ../dummy-lambda.zip index.py
          cd -

          aws s3 cp .build/dummy-lambda.zip \
            "s3://${LAMBDA_ARTIFACTS_BUCKET}/Lambda-Artifacts/dummy-lambda/dummy-lambda.zip" \
            --region "${AWS_REGION}"

          echo "Dummy Lambda artifact uploaded."

  data:
    name: Deploy 02-data
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs:
      - storage
    if: >-
      ${{
        always() &&
        (inputs.deploy_all || inputs.deploy_data) &&
        (needs.storage.result == 'success' || needs.storage.result == 'skipped')
      }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      ENVIRONMENT: ${{ inputs.environment }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate template
        run: |
          aws cloudformation validate-template \
            --template-body file://infra/02-data.yaml \
            --region "$AWS_REGION"

      - name: Deploy data stack
        shell: bash
        run: |
          aws cloudformation deploy \
            --template-file  file://infra/02-data.yaml \
            --stack-name "${PROJECT_NAME}-${ENVIRONMENT}-data" \
            --parameter-overrides ProjectName="${PROJECT_NAME}" Environment="${ENVIRONMENT}" EnablePointInTimeRecovery=false \
            --region "${AWS_REGION}"

  auth:
    name: Deploy 03-auth
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs:
      - storage
    if: >-
      ${{
        always() &&
        (inputs.deploy_all || inputs.deploy_auth) &&
        (needs.storage.result == 'success' || needs.storage.result == 'skipped')
      }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      ENVIRONMENT: ${{ inputs.environment }}
      CALLBACK_URL: ${{ vars.CALLBACK_URL }}
      LOGOUT_URL: ${{ vars.LOGOUT_URL }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate template
        run: |
          aws cloudformation validate-template \
            --template-body file://infra/03-auth.yaml \
            --region "$AWS_REGION"

      - name: Deploy auth stack
        shell: bash
        run: |
          aws cloudformation deploy \
            --template-file file://infra/03-auth.yaml \
            --stack-name "${PROJECT_NAME}-${ENVIRONMENT}-auth" \
            --parameter-overrides ProjectName="${PROJECT_NAME}" Environment="${ENVIRONMENT}" CallbackUrl="${CALLBACK_URL}" LogoutUrl="${LOGOUT_URL}" \
            --region "${AWS_REGION}"

  messaging:
    name: Deploy 04-messaging
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs:
      - storage
    if: >-
      ${{
        always() &&
        (inputs.deploy_all || inputs.deploy_messaging) &&
        (needs.storage.result == 'success' || needs.storage.result == 'skipped')
      }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      ENVIRONMENT: ${{ inputs.environment }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate template
        run: |
          aws cloudformation validate-template \
            --template-body file://infra/04-messaging.yaml \
            --region "$AWS_REGION"

      - name: Deploy messaging stack
        shell: bash
        run: |
          aws cloudformation deploy \
            --template-file file://infra/04-messaging.yaml \
            --stack-name "${PROJECT_NAME}-${ENVIRONMENT}-messaging" \
            --parameter-overrides ProjectName="${PROJECT_NAME}" Environment="${ENVIRONMENT}" \
            --region "${AWS_REGION}"

  lambdas-events:
    name: Deploy 05-lambdas-events
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs:
      - data
      - messaging
      - dummy-lambda-artifact
    if: >-
      ${{
        always() &&
        (inputs.deploy_all || inputs.deploy_lambdas_events) &&
        (needs.data.result == 'success' || needs.data.result == 'skipped') &&
        (needs.messaging.result == 'success' || needs.messaging.result == 'skipped') &&
        (needs.dummy-lambda-artifact.result == 'success' || needs.dummy-lambda-artifact.result == 'skipped')
      }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      ENVIRONMENT: ${{ inputs.environment }}
      SENDER_EMAIL: ${{ vars.SENDER_EMAIL }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate template
        run: |
          aws cloudformation validate-template \
            --template-body file://infra/05-lambdas-events.yaml \
            --region "$AWS_REGION"

      - name: Deploy lambdas events stack
        shell: bash
        run: |
          aws cloudformation deploy \
            --template-file file://infra/05-lambdas-events.yaml \
            --stack-name "${PROJECT_NAME}-${ENVIRONMENT}-lambdas-events" \
            --parameter-overrides ProjectName="${PROJECT_NAME}" Environment="${ENVIRONMENT}" SenderEmail="${SENDER_EMAIL}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --region "${AWS_REGION}"

  lambdas-registrations:
    name: Deploy 06-lambdas-registrations
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs:
      - data
      - messaging
      - dummy-lambda-artifact
    if: >-
      ${{
        always() &&
        (inputs.deploy_all || inputs.deploy_lambdas_registrations) &&
        (needs.data.result == 'success' || needs.data.result == 'skipped') &&
        (needs.messaging.result == 'success' || needs.messaging.result == 'skipped') &&
        (needs.dummy-lambda-artifact.result == 'success' || needs.dummy-lambda-artifact.result == 'skipped')
      }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      ENVIRONMENT: ${{ inputs.environment }}
      SENDER_EMAIL: ${{ vars.SENDER_EMAIL }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate template
        run: |
          aws cloudformation validate-template \
            --template-body file://infra/06-lambdas-registrations.yaml \
            --region "$AWS_REGION"

      - name: Deploy lambdas registrations stack
        shell: bash
        run: |
          aws cloudformation deploy \
            --template-file file://infra/06-lambdas-registrations.yaml \
            --stack-name "${PROJECT_NAME}-${ENVIRONMENT}-lambdas-registration" \
            --parameter-overrides ProjectName="${PROJECT_NAME}" Environment="${ENVIRONMENT}" SenderEmail="${SENDER_EMAIL}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --region "${AWS_REGION}"

  lambdas-reports:
    name: Deploy 07-lambdas-reports
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs:
      - data
      - messaging
      - dummy-lambda-artifact
    if: >-
      ${{
        always() &&
        (inputs.deploy_all || inputs.deploy_lambdas_reports) &&
        (needs.data.result == 'success' || needs.data.result == 'skipped') &&
        (needs.messaging.result == 'success' || needs.messaging.result == 'skipped') &&
        (needs.dummy-lambda-artifact.result == 'success' || needs.dummy-lambda-artifact.result == 'skipped')
      }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      ENVIRONMENT: ${{ inputs.environment }}
      SENDER_EMAIL: ${{ vars.SENDER_EMAIL }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate template
        run: |
          aws cloudformation validate-template \
            --template-body file://infra/07-lambdas-reports.yaml \
            --region "$AWS_REGION"

      - name: Deploy lambdas reports stack
        shell: bash
        run: |
          aws cloudformation deploy \
            --template-file file://infra/07-lambdas-reports.yaml \
            --stack-name "${PROJECT_NAME}-${ENVIRONMENT}-lambdas-report" \
            --parameter-overrides ProjectName="${PROJECT_NAME}" Environment="${ENVIRONMENT}" SenderEmail="${SENDER_EMAIL}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --region "${AWS_REGION}"

  lambdas-notifications:
    name: Deploy 08-lambdas-notifications
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs:
      - data
      - messaging
      - dummy-lambda-artifact
    if: >-
      ${{
        always() &&
        (inputs.deploy_all || inputs.deploy_lambdas_notifications) &&
        (needs.data.result == 'success' || needs.data.result == 'skipped') &&
        (needs.messaging.result == 'success' || needs.messaging.result == 'skipped') &&
        (needs.dummy-lambda-artifact.result == 'success' || needs.dummy-lambda-artifact.result == 'skipped')
      }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      ENVIRONMENT: ${{ inputs.environment }}
      SENDER_EMAIL: ${{ vars.SENDER_EMAIL }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate template
        run: |
          aws cloudformation validate-template \
            --template-body file://infra/08-lambdas-notifications.yaml \
            --region "$AWS_REGION"

      - name: Deploy lambdas notifications stack
        shell: bash
        run: |
          aws cloudformation deploy \
            --template-file file://infra/08-lambdas-notifications.yaml \
            --stack-name "${PROJECT_NAME}-${ENVIRONMENT}-lambdas-notifications" \
            --parameter-overrides ProjectName="${PROJECT_NAME}" Environment="${ENVIRONMENT}" SenderEmail="${SENDER_EMAIL}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --region "${AWS_REGION}"

  api:
    name: Deploy 09-api
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs:
      - auth
      - lambdas-events
      - lambdas-registrations
      - lambdas-reports
      - lambdas-notifications
    if: >-
      ${{
        always() &&
        (inputs.deploy_all || inputs.deploy_api) &&
        (needs.auth.result == 'success' || needs.auth.result == 'skipped') &&
        (needs.lambdas-events.result == 'success' || needs.lambdas-events.result == 'skipped') &&
        (needs.lambdas-registrations.result == 'success' || needs.lambdas-registrations.result == 'skipped') &&
        (needs.lambdas-reports.result == 'success' || needs.lambdas-reports.result == 'skipped') &&
        (needs.lambdas-notifications.result == 'success' || needs.lambdas-notifications.result == 'skipped')
      }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      ENVIRONMENT: ${{ inputs.environment }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate template
        run: |
          aws cloudformation validate-template \
            --template-body file://infra/09-api.yaml \
            --region "$AWS_REGION"

      - name: Deploy API stack
        shell: bash
        run: |
          aws cloudformation deploy \
            --template-file file://infra/09-api.yaml \
            --stack-name "${PROJECT_NAME}-${ENVIRONMENT}-compute-api" \
            --parameter-overrides ProjectName="${PROJECT_NAME}" Environment="${ENVIRONMENT}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --region "${AWS_REGION}"
