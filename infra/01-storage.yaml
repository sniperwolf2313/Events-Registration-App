AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Storage and CDN stack for the serverless event management MVP. Creates S3 buckets for frontend/lambda artifacts, reports, templates/media, and a CloudFront distribution with Origin Access Control.

Parameters:
  ProjectName:
    Type: String
    Default: event-manager
    AllowedPattern: ^[a-z][a-z0-9-]{2,30}$
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - qa
      - prod
  PriceClass:
    Type: String
    Default: PriceClass_100
    AllowedValues:
      - PriceClass_100
      - PriceClass_200
      - PriceClass_All
  EnableS3AccessLogs:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'

Conditions:
  UseS3AccessLogs: !Equals
    - !Ref EnableS3AccessLogs
    - 'true'

Resources:
  FrontendArtifactsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub ${ProjectName}-${Environment}-front-artifacts
      VersioningConfiguration:
        Status: Enabled
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LoggingConfiguration: !If
        - UseS3AccessLogs
        - DestinationBucketName: !Ref AccessLogsBucket
          LogFilePrefix: frontend-artifacts/
        - !Ref AWS::NoValue
      LifecycleConfiguration:
        Rules:
          - Id: expire-old-artifacts
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

  ReportsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub ${ProjectName}-${Environment}-reports
      VersioningConfiguration:
        Status: Enabled
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: expire-old-reports
            Status: Enabled
            Prefix: reports/
            ExpirationInDays: 180
            NoncurrentVersionExpiration:
              NoncurrentDays: 30
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

  TemplatesFilesBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub ${ProjectName}-${Environment}-templates-files
      VersioningConfiguration:
        Status: Enabled
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: abort-incomplete-uploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

  AccessLogsBucket:
    Type: AWS::S3::Bucket
    Condition: UseS3AccessLogs
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub ${ProjectName}-${Environment}-access-logs
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: expire-access-logs
            Status: Enabled
            ExpirationInDays: 90

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${ProjectName}-${Environment}-s3-oac
        Description: OAC for private S3 frontend bucket
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub ${ProjectName}-${Environment} frontend distribution
        DefaultRootObject: index.html
        PriceClass: !Ref PriceClass
        HttpVersion: http2
        IPV6Enabled: true
        Origins:
          - Id: frontend-s3-origin
            DomainName: !GetAtt FrontendArtifactsBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: frontend-s3-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          MinTTL: 0
          DefaultTTL: 300
          MaxTTL: 86400
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendArtifactsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipalReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${FrontendArtifactsBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}

Outputs:
  FrontendArtifactsBucketName:
    Description: Bucket for static frontend and lambda zip artifacts.
    Value: !Ref FrontendArtifactsBucket
    Export:
      Name: !Sub ${ProjectName}-${Environment}-FrontendArtifactsBucketName
  FrontendArtifactsBucketArn:
    Value: !GetAtt FrontendArtifactsBucket.Arn
    Export:
      Name: !Sub ${ProjectName}-${Environment}-FrontendArtifactsBucketArn
  ReportsBucketName:
    Value: !Ref ReportsBucket
    Export:
      Name: !Sub ${ProjectName}-${Environment}-ReportsBucketName
  ReportsBucketArn:
    Value: !GetAtt ReportsBucket.Arn
    Export:
      Name: !Sub ${ProjectName}-${Environment}-ReportsBucketArn
  TemplatesFilesBucketName:
    Value: !Ref TemplatesFilesBucket
    Export:
      Name: !Sub ${ProjectName}-${Environment}-TemplatesFilesBucketName
  TemplatesFilesBucketArn:
    Value: !GetAtt TemplatesFilesBucket.Arn
    Export:
      Name: !Sub ${ProjectName}-${Environment}-TemplatesFilesBucketArn
  CloudFrontDistributionId:
    Value: !Ref FrontendDistribution
    Export:
      Name: !Sub ${ProjectName}-${Environment}-CloudFrontDistributionId
  CloudFrontDomainName:
    Value: !GetAtt FrontendDistribution.DomainName
    Export:
      Name: !Sub ${ProjectName}-${Environment}-CloudFrontDomainName