AWSTemplateFormatVersion: '2010-09-09'
Description: Cognito User Pool authentication stack with organizer and attendee groups.

Parameters:
  ProjectName:
    Type: String
    Default: event-manager
    AllowedPattern: '^[a-z][a-z0-9-]{2,30}$'
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, qa, prod]
  CallbackUrl:
    Type: String
    Default: http://localhost:3000/callback
  LogoutUrl:
    Type: String
    Default: http://localhost:3000/logout

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub '${ProjectName}-${Environment}-user-pool'
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      MfaConfiguration: 'OFF'
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: false
          TemporaryPasswordValidityDays: 7
      Schema:
        - Name: email
          Required: true
          Mutable: true
        - Name: name
          Required: false
          Mutable: true
      UserPoolAddOns:
        AdvancedSecurityMode: 'OFF'

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub '${ProjectName}-${Environment}-${AWS::AccountId}'
      UserPoolId: !Ref UserPool

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${ProjectName}-${Environment}-web-client'
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      EnableTokenRevocation: true
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 7
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      SupportedIdentityProviders: [COGNITO]
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows: [code]
      AllowedOAuthScopes: [openid, email, profile]
      CallbackURLs:
        - !Ref CallbackUrl
      LogoutURLs:
        - !Ref LogoutUrl
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  OrganizersGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: organizers
      Description: Users allowed to create, update, delete events and request reports.
      Precedence: 1
      UserPoolId: !Ref UserPool

  AttendeesGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: attendees
      Description: Users allowed to browse active events and register/cancel their own registrations.
      Precedence: 2
      UserPoolId: !Ref UserPool

Outputs:
  UserPoolId:
    Value: !Ref UserPool
    Export:
      Name: !Sub '${ProjectName}-${Environment}-UserPoolId'
  UserPoolArn:
    Value: !GetAtt UserPool.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-UserPoolArn'
  UserPoolClientId:
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub '${ProjectName}-${Environment}-UserPoolClientId'
  UserPoolIssuer:
    Value: !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}'
    Export:
      Name: !Sub '${ProjectName}-${Environment}-UserPoolIssuer'
  CognitoHostedUiDomain:
    Value: !Sub 'https://${UserPoolDomain}.auth.${AWS::Region}.amazoncognito.com'
    Export:
      Name: !Sub '${ProjectName}-${Environment}-CognitoHostedUiDomain'
