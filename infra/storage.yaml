AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Storage stack for the serverless event management application

Parameters:
  ProjectName:
    Type: String
    Description: Project name used as prefix for resource names

  Environment:
    Type: String
    Description: Deployment environment
    AllowedValues:
      - dev
      - qa
      - prod

  KmsKeyArn:
    Type: String
    Description: KMS Key ARN exported from security stack

Resources:

  # DynamoDB - Events

  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: 
        Fn:Sub: ${ProjectName}-${Environment}-events
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: eventId #EVT-001
          AttributeType: S 
        - AttributeName: title #Taller de AWS
          AttributeType: S
        - AttributeName: description #Capacitación en arquitectura serverless
          AttributeType: S
        - AttributeName: location #Auditorio
          AttributeType: S
        - AttributeName: startDateTime # 2026-04-25T08:00:00Z
          AttributeType: S
        - AttributeName: endDateTime # 2026-04-25T12:00:00Z
          AttributeType: S
        - AttributeName: capacity #50
          AttributeType: S
        - AttributeName: availableSlots # 20
          AttributeType: S
        - AttributeName: status # 1: abierto, 2: cerrado, 3: cancelado
          AttributeType: S
        - AttributeName: createdBy # admin-001
          AttributeType: S
        - AttributeName: createdAt # 2026-04-20T10:00:00Z
          AttributeType: S

      KeySchema:
        - AttributeName: eventId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: status-startDateTime-index
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: startDateTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: organizerId-startDateTime-index
          KeySchema:
            - AttributeName: createdBy
              KeyType: HASH
            - AttributeName: startDateTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
        KMSMasterKeyId: !Ref KmsKeyArn
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # DynamoDB - Registrations

  RegistrationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: 
        Fn:Sub: ${ProjectName}-${Environment}-registrations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId #USR-025
          AttributeType: S
        - AttributeName: eventId #EVT-001
          AttributeType: S
        - AttributeName: name # Juan Pérez
          AttributeType: S
        - AttributeName: email # usuario@correo.com
          AttributeType: S
        - AttributeName: status # 1: inscrito, 2: cancelado
          AttributeType: S
        - AttributeName: registeredAt # 2026-04-21T14:00:00Z
          AttributeType: S
        - AttributeName: statusAsistencia # 1: presente, 2: ausente, 3: pendiente
          AttributeType: S

      KeySchema:
        - AttributeName: registrationId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: eventId-registeredAt-index
          KeySchema:
            - AttributeName: eventId
              KeyType: HASH
            - AttributeName: registeredAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: attendeeId-registeredAt-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: registeredAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
        KMSMasterKeyId: !Ref KmsKeyArn
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
      # DynamoDB - Registrations

  NotificationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: 
        Fn:Sub: ${ProjectName}-${Environment}-notifications
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: templateId #TPL-001
          AttributeType: S
        - AttributeName: templateName # Recordatorio 24 horas
          AttributeType: S
        - AttributeName: subject # Recordatorio de tu evento
          AttributeType: S
        - AttributeName: message # Hola {nombre}, te recordamos que el evento {titulo} inicia el {fecha}.
          AttributeType: S
        - AttributeName: type # recordatorio_24h
          AttributeType: S
        - AttributeName: status # 1: activo, 2: inactivo
          AttributeType: S
        - AttributeName: createdAt # 2026-04-20T09:00:00Z
          AttributeType: S

      KeySchema:
        - AttributeName: templateId
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true
        KMSMasterKeyId: !Ref KmsKeyArn
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  ReportsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-${Environment}-reports-${AWS::AccountId}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref KmsKeyArn
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-${Environment}-frontend-${AWS::AccountId}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref KmsKeyArn
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  TemplatesFilesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-${Environment}-templates-${AWS::AccountId}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref KmsKeyArn
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

Outputs:
  EventsTableName:
    Description: Events table name
    Value: !Ref EventsTable
    Export:
      Name: !Sub ${ProjectName}-${Environment}-EventsTableName

  EventsTableArn:
    Description: Events table ARN
    Value: !GetAtt EventsTable.Arn
    Export:
      Name: !Sub ${ProjectName}-${Environment}-EventsTableArn

  RegistrationsTableName:
    Description: Registrations table name
    Value: !Ref RegistrationsTable
    Export:
      Name: !Sub ${ProjectName}-${Environment}-RegistrationsTableName

  RegistrationsTableArn:
    Description: Registrations table ARN
    Value: !GetAtt RegistrationsTable.Arn
    Export:
      Name: !Sub ${ProjectName}-${Environment}-RegistrationsTableArn

  NotificationsTableName:
    Description: Notifications table name
    Value: !Ref NotificationsTable
    Export:
      Name: !Sub ${ProjectName}-${Environment}-NotificationsTableName

  NotificationsTableArn:
    Description: Notifications table ARN
    Value: !GetAtt NotificationsTable.Arn
    Export:
      Name: !Sub ${ProjectName}-${Environment}-NotificationsTableArn

  ReportsBucketName:
    Description: Reports bucket name
    Value: !Ref ReportsBucket
    Export:
      Name: !Sub ${ProjectName}-${Environment}-ReportsBucketName

  ReportsBucketArn:
    Description: Reports bucket ARN
    Value: !GetAtt ReportsBucket.Arn
    Export:
      Name: !Sub ${ProjectName}-${Environment}-ReportsBucketArn

  FrontendBucketName:
    Description: Frontend bucket name
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub ${ProjectName}-${Environment}-FrontendBucketName

  FrontendBucketArn:
    Description: Frontend bucket ARN
    Value: !GetAtt FrontendBucket.Arn
    Export:
      Name: !Sub ${ProjectName}-${Environment}-FrontendBucketArn
  
  TemplatesBucketName:
    Description: Templates bucket name
    Value: !Ref TemplatesFilesBucket
    Export:
      Name: !Sub ${ProjectName}-${Environment}-TemplatesFilesBucketName

  TemplatesBucketArn:
    Description: Templates bucket ARN
    Value: !GetAtt TemplatesFilesBucket.Arn
    Export:
      Name: !Sub ${ProjectName}-${Environment}-TemplatesFilesBucketArn