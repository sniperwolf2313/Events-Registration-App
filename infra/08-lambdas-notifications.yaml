AWSTemplateFormatVersion: '2010-09-09'
Description: Notification Lambda, SQS trigger, SES identity, and least-privilege IAM role.
Parameters:
  ProjectName:
    Type: String
    Default: event-manager
    AllowedPattern: ^[a-z][a-z0-9-]{2,30}$
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - qa
      - prod
  SenderEmail:
    Type: String
    Default: sniperwolf2313@gmail.com
    Description: SES sender email. In sandbox, sender and recipients must be verified.
  LambdaLogRetentionDays:
    Type: Number
    Default: 14
Resources:
  SendNotificationLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ProjectName}-${Environment}-SendNotification
      RetentionInDays: !Ref LambdaLogRetentionDays
  SendNotificationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-SendNotification-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SendNotification-least-privilege-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-${Environment}-SendNotification:*
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource:
                  - !ImportValue
                    Fn::Sub: ${ProjectName}-${Environment}-NotificationTemplatesTableArn
                  - !Sub
                    - ${TableArn}/index/*
                    - TableArn: !ImportValue
                        Fn::Sub: ${ProjectName}-${Environment}-NotificationTemplatesTableArn
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub
                  - ${TemplatesBucketArn}/*
                  - TemplatesBucketArn: !ImportValue
                      Fn::Sub: ${ProjectName}-${Environment}-TemplatesFilesBucketArn
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: '*'
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                  - sqs:ChangeMessageVisibility
                Resource: !ImportValue
                  Fn::Sub: ${ProjectName}-${Environment}-NotificationsQueueArn
  SendNotificationFunction:
    Type: AWS::Lambda::Function
    DependsOn: SendNotificationLogGroup
    Properties:
      FunctionName: !Sub ${ProjectName}-${Environment}-SendNotification
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt SendNotificationRole.Arn
      Timeout: 60
      MemorySize: 128
      Architectures:
        - arm64
      Environment:
        Variables:
          NOTIFICATION_TEMPLATES_TABLE: !ImportValue
            Fn::Sub: ${ProjectName}-${Environment}-NotificationTemplatesTableName
          TEMPLATES_FILES_BUCKET: !ImportValue
            Fn::Sub: ${ProjectName}-${Environment}-TemplatesFilesBucketName
          SES_SENDER_EMAIL: !Ref SenderEmail
          FUNCTION_NAME: SendNotification
      Code:
        S3Bucket: !ImportValue
          Fn::Sub: ${ProjectName}-${Environment}-FrontendArtifactsBucketName
        S3Key: Lambda-Artifacts/dummy-lambda/dummy-lambda.zip
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
  SendNotificationEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      BatchSize: 10
      MaximumBatchingWindowInSeconds: 5
      Enabled: true
      EventSourceArn: !ImportValue
        Fn::Sub: ${ProjectName}-${Environment}-NotificationsQueueArn
      FunctionName: !Ref SendNotificationFunction
  SenderEmailIdentity:
    Type: AWS::SES::EmailIdentity
    Properties:
      EmailIdentity: !Ref SenderEmail
Outputs:
  SendNotificationFunctionName:
    Value: !Ref SendNotificationFunction
    Export:
      Name: !Sub ${ProjectName}-${Environment}-SendNotificationFunctionName
  SendNotificationFunctionArn:
    Value: !GetAtt SendNotificationFunction.Arn
    Export:
      Name: !Sub ${ProjectName}-${Environment}-SendNotificationFunctionArn