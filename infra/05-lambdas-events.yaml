AWSTemplateFormatVersion: '2010-09-09'
Description: Event-management Lambdas, event status scheduler, and
  least-privilege IAM roles.
Parameters:
  ProjectName:
    Type: String
    Default: event-manager
    AllowedPattern: ^[a-z][a-z0-9-]{2,30}$
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - qa
      - prod
  SenderEmail:
    Type: String
    Default: no-reply@example.com
    Description: SES sender email. In sandbox, sender and recipients must be verified.
  LambdaLogRetentionDays:
    Type: Number
    Default: 14
Resources:
  CreateEventLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ProjectName}-${Environment}-CreateEvent
      RetentionInDays: !Ref LambdaLogRetentionDays
  GetEventLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ProjectName}-${Environment}-GetEvent
      RetentionInDays: !Ref LambdaLogRetentionDays
  UpdateEventLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ProjectName}-${Environment}-UpdateEvent
      RetentionInDays: !Ref LambdaLogRetentionDays
  DeleteEventLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ProjectName}-${Environment}-DeleteEvent
      RetentionInDays: !Ref LambdaLogRetentionDays
  UpdateEventStatusLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ProjectName}-${Environment}-UpdateEventStatus
      RetentionInDays: !Ref LambdaLogRetentionDays
  SchedulerGroup:
    Type: AWS::Scheduler::ScheduleGroup
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-schedules
  SchedulerToNotificationsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-scheduler-to-notifications
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: send-notification-messages
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !ImportValue
                  Fn::Sub: ${ProjectName}-${Environment}-NotificationsQueueArn
  CreateEventRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-CreateEvent-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CreateEvent-least-privilege-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-${Environment}-CreateEvent:*
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource: !ImportValue
                  Fn::Sub: ${ProjectName}-${Environment}-EventsTableArn
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !ImportValue
                  Fn::Sub: ${ProjectName}-${Environment}-NotificationsQueueArn
              - Effect: Allow
                Action:
                  - scheduler:CreateSchedule
                  - scheduler:UpdateSchedule
                  - scheduler:DeleteSchedule
                  - scheduler:GetSchedule
                Resource: !Sub arn:aws:scheduler:${AWS::Region}:${AWS::AccountId}:schedule/${ProjectName}-${Environment}-schedules/*
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt SchedulerToNotificationsRole.Arn
                Condition:
                  StringEquals:
                    iam:PassedToService: scheduler.amazonaws.com
  GetEventRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-GetEvent-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GetEvent-least-privilege-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-${Environment}-GetEvent:*
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !ImportValue
                    Fn::Sub: ${ProjectName}-${Environment}-EventsTableArn
                  - !Sub
                    - ${TableArn}/index/*
                    - TableArn: !ImportValue
                        Fn::Sub: ${ProjectName}-${Environment}-EventsTableArn
                  - !ImportValue
                    Fn::Sub: ${ProjectName}-${Environment}-RegistrationsTableArn
                  - !Sub
                    - ${TableArn}/index/*
                    - TableArn: !ImportValue
                        Fn::Sub: ${ProjectName}-${Environment}-RegistrationsTableArn
  UpdateEventRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-UpdateEvent-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: UpdateEvent-least-privilege-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-${Environment}-UpdateEvent:*
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                Resource:
                  - !ImportValue
                    Fn::Sub: ${ProjectName}-${Environment}-EventsTableArn
                  - !Sub
                    - ${TableArn}/index/*
                    - TableArn: !ImportValue
                        Fn::Sub: ${ProjectName}-${Environment}-EventsTableArn
                  - !ImportValue
                    Fn::Sub: ${ProjectName}-${Environment}-RegistrationsTableArn
                  - !Sub
                    - ${TableArn}/index/*
                    - TableArn: !ImportValue
                        Fn::Sub: ${ProjectName}-${Environment}-RegistrationsTableArn
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !ImportValue
                  Fn::Sub: ${ProjectName}-${Environment}-NotificationsQueueArn
              - Effect: Allow
                Action:
                  - scheduler:CreateSchedule
                  - scheduler:UpdateSchedule
                  - scheduler:DeleteSchedule
                  - scheduler:GetSchedule
                Resource: !Sub arn:aws:scheduler:${AWS::Region}:${AWS::AccountId}:schedule/${ProjectName}-${Environment}-schedules/*
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt SchedulerToNotificationsRole.Arn
                Condition:
                  StringEquals:
                    iam:PassedToService: scheduler.amazonaws.com
  DeleteEventRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-DeleteEvent-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DeleteEvent-least-privilege-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-${Environment}-DeleteEvent:*
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                Resource:
                  - !ImportValue
                    Fn::Sub: ${ProjectName}-${Environment}-EventsTableArn
                  - !Sub
                    - ${TableArn}/index/*
                    - TableArn: !ImportValue
                        Fn::Sub: ${ProjectName}-${Environment}-EventsTableArn
                  - !ImportValue
                    Fn::Sub: ${ProjectName}-${Environment}-RegistrationsTableArn
                  - !Sub
                    - ${TableArn}/index/*
                    - TableArn: !ImportValue
                        Fn::Sub: ${ProjectName}-${Environment}-RegistrationsTableArn
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !ImportValue
                  Fn::Sub: ${ProjectName}-${Environment}-NotificationsQueueArn
              - Effect: Allow
                Action:
                  - scheduler:DeleteSchedule
                  - scheduler:GetSchedule
                Resource: !Sub arn:aws:scheduler:${AWS::Region}:${AWS::AccountId}:schedule/${ProjectName}-${Environment}-schedules/*
  UpdateEventStatusRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-UpdateEventStatus-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: UpdateEventStatus-least-privilege-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-${Environment}-UpdateEventStatus:*
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource:
                  - !ImportValue
                    Fn::Sub: ${ProjectName}-${Environment}-EventsTableArn
                  - !Sub
                    - ${TableArn}/index/*
                    - TableArn: !ImportValue
                        Fn::Sub: ${ProjectName}-${Environment}-EventsTableArn
                  - !ImportValue
                    Fn::Sub: ${ProjectName}-${Environment}-RegistrationsTableArn
                  - !Sub
                    - ${TableArn}/index/*
                    - TableArn: !ImportValue
                        Fn::Sub: ${ProjectName}-${Environment}-RegistrationsTableArn
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !ImportValue
                  Fn::Sub: ${ProjectName}-${Environment}-NotificationsQueueArn
  CreateEventFunction:
    Type: AWS::Lambda::Function
    DependsOn: CreateEventLogGroup
    Properties:
      FunctionName: !Sub ${ProjectName}-${Environment}-CreateEvent
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt CreateEventRole.Arn
      Timeout: 30
      MemorySize: 128
      Architectures:
        - arm64
      Environment:
        Variables:
          EVENTS_TABLE: !ImportValue
            Fn::Sub: ${ProjectName}-${Environment}-EventsTableName
          REGISTRATIONS_TABLE: !ImportValue
            Fn::Sub: ${ProjectName}-${Environment}-RegistrationsTableName
          NOTIFICATIONS_QUEUE_URL: !ImportValue
            Fn::Sub: ${ProjectName}-${Environment}-NotificationsQueueUrl
          SCHEDULER_GROUP_NAME: !Ref SchedulerGroup
          SCHEDULER_TO_NOTIFICATIONS_ROLE_ARN: !GetAtt SchedulerToNotificationsRole.Arn
          SES_SENDER_EMAIL: !Ref SenderEmail
          FUNCTION_NAME: CreateEvent
      Code:
        S3Bucket:
          Fn::ImportValue: !Sub "${ProjectName}-${Environment}-FrontendArtifactsBucketName"
        S3Key: Lambda-Artifacts/dummy-lambda/dummy-lambda.zip
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
  GetEventFunction:
    Type: AWS::Lambda::Function
    DependsOn: GetEventLogGroup
    Properties:
      FunctionName: !Sub ${ProjectName}-${Environment}-GetEvent
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt GetEventRole.Arn
      Timeout: 30
      MemorySize: 128
      Architectures:
        - arm64
      Environment:
        Variables:
          EVENTS_TABLE: !ImportValue
            Fn::Sub: ${ProjectName}-${Environment}-EventsTableName
          REGISTRATIONS_TABLE: !ImportValue
            Fn::Sub: ${ProjectName}-${Environment}-RegistrationsTableName
          NOTIFICATIONS_QUEUE_URL: !ImportValue
            Fn::Sub: ${ProjectName}-${Environment}-NotificationsQueueUrl
          SCHEDULER_GROUP_NAME: !Ref SchedulerGroup
          SCHEDULER_TO_NOTIFICATIONS_ROLE_ARN: !GetAtt SchedulerToNotificationsRole.Arn
          SES_SENDER_EMAIL: !Ref SenderEmail
          FUNCTION_NAME: GetEvent
      Code:
        S3Bucket:
          Fn::ImportValue: !Sub "${ProjectName}-${Environment}-FrontendArtifactsBucketName"
        S3Key: Lambda-Artifacts/dummy-lambda/dummy-lambda.zip
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
  UpdateEventFunction:
    Type: AWS::Lambda::Function
    DependsOn: UpdateEventLogGroup
    Properties:
      FunctionName: !Sub ${ProjectName}-${Environment}-UpdateEvent
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt UpdateEventRole.Arn
      Timeout: 30
      MemorySize: 128
      Architectures:
        - arm64
      Environment:
        Variables:
          EVENTS_TABLE: !ImportValue
            Fn::Sub: ${ProjectName}-${Environment}-EventsTableName
          REGISTRATIONS_TABLE: !ImportValue
            Fn::Sub: ${ProjectName}-${Environment}-RegistrationsTableName
          NOTIFICATIONS_QUEUE_URL: !ImportValue
            Fn::Sub: ${ProjectName}-${Environment}-NotificationsQueueUrl
          SCHEDULER_GROUP_NAME: !Ref SchedulerGroup
          SCHEDULER_TO_NOTIFICATIONS_ROLE_ARN: !GetAtt SchedulerToNotificationsRole.Arn
          SES_SENDER_EMAIL: !Ref SenderEmail
          FUNCTION_NAME: UpdateEvent
      Code:
        S3Bucket:
          Fn::ImportValue: !Sub "${ProjectName}-${Environment}-FrontendArtifactsBucketName"
        S3Key: Lambda-Artifacts/dummy-lambda/dummy-lambda.zip
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
  DeleteEventFunction:
    Type: AWS::Lambda::Function
    DependsOn: DeleteEventLogGroup
    Properties:
      FunctionName: !Sub ${ProjectName}-${Environment}-DeleteEvent
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt DeleteEventRole.Arn
      Timeout: 30
      MemorySize: 128
      Architectures:
        - arm64
      Environment:
        Variables:
          EVENTS_TABLE: !ImportValue
            Fn::Sub: ${ProjectName}-${Environment}-EventsTableName
          REGISTRATIONS_TABLE: !ImportValue
            Fn::Sub: ${ProjectName}-${Environment}-RegistrationsTableName
          NOTIFICATIONS_QUEUE_URL: !ImportValue
            Fn::Sub: ${ProjectName}-${Environment}-NotificationsQueueUrl
          SCHEDULER_GROUP_NAME: !Ref SchedulerGroup
          SCHEDULER_TO_NOTIFICATIONS_ROLE_ARN: !GetAtt SchedulerToNotificationsRole.Arn
          SES_SENDER_EMAIL: !Ref SenderEmail
          FUNCTION_NAME: DeleteEvent
      Code:
        S3Bucket:
          Fn::ImportValue: !Sub "${ProjectName}-${Environment}-FrontendArtifactsBucketName"
        S3Key: Lambda-Artifacts/dummy-lambda/dummy-lambda.zip
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
  UpdateEventStatusFunction:
    Type: AWS::Lambda::Function
    DependsOn: UpdateEventStatusLogGroup
    Properties:
      FunctionName: !Sub ${ProjectName}-${Environment}-UpdateEventStatus
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt UpdateEventStatusRole.Arn
      Timeout: 120
      MemorySize: 128
      Architectures:
        - arm64
      Environment:
        Variables:
          EVENTS_TABLE: !ImportValue
            Fn::Sub: ${ProjectName}-${Environment}-EventsTableName
          REGISTRATIONS_TABLE: !ImportValue
            Fn::Sub: ${ProjectName}-${Environment}-RegistrationsTableName
          NOTIFICATIONS_QUEUE_URL: !ImportValue
            Fn::Sub: ${ProjectName}-${Environment}-NotificationsQueueUrl
          SCHEDULER_GROUP_NAME: !Ref SchedulerGroup
          SCHEDULER_TO_NOTIFICATIONS_ROLE_ARN: !GetAtt SchedulerToNotificationsRole.Arn
          SES_SENDER_EMAIL: !Ref SenderEmail
          FUNCTION_NAME: UpdateEventStatus
      Code:
        S3Bucket:
          Fn::ImportValue: !Sub "${ProjectName}-${Environment}-FrontendArtifactsBucketName"
        S3Key: Lambda-Artifacts/dummy-lambda/dummy-lambda.zip
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
  SchedulerInvokeUpdateStatusRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-scheduler-invoke-update-status
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: invoke-update-status-lambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt UpdateEventStatusFunction.Arn
  UpdateEventStatusSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-update-event-status
      GroupName: !Ref SchedulerGroup
      FlexibleTimeWindow:
        Mode: 'OFF'
      ScheduleExpression: rate(5 minutes)
      State: ENABLED
      Target:
        Arn: !GetAtt UpdateEventStatusFunction.Arn
        RoleArn: !GetAtt SchedulerInvokeUpdateStatusRole.Arn
  UpdateEventStatusLambdaPermissionForScheduler:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref UpdateEventStatusFunction
      Principal: scheduler.amazonaws.com
      SourceArn: !Sub arn:aws:scheduler:${AWS::Region}:${AWS::AccountId}:schedule/${ProjectName}-${Environment}-schedules/${ProjectName}-${Environment}-update-event-status
Outputs:
  CreateEventFunctionName:
    Value: !Ref CreateEventFunction
    Export:
      Name: !Sub ${ProjectName}-${Environment}-CreateEventFunctionName
  CreateEventFunctionArn:
    Value: !GetAtt CreateEventFunction.Arn
    Export:
      Name: !Sub ${ProjectName}-${Environment}-CreateEventFunctionArn
  GetEventFunctionName:
    Value: !Ref GetEventFunction
    Export:
      Name: !Sub ${ProjectName}-${Environment}-GetEventFunctionName
  GetEventFunctionArn:
    Value: !GetAtt GetEventFunction.Arn
    Export:
      Name: !Sub ${ProjectName}-${Environment}-GetEventFunctionArn
  UpdateEventFunctionName:
    Value: !Ref UpdateEventFunction
    Export:
      Name: !Sub ${ProjectName}-${Environment}-UpdateEventFunctionName
  UpdateEventFunctionArn:
    Value: !GetAtt UpdateEventFunction.Arn
    Export:
      Name: !Sub ${ProjectName}-${Environment}-UpdateEventFunctionArn
  DeleteEventFunctionName:
    Value: !Ref DeleteEventFunction
    Export:
      Name: !Sub ${ProjectName}-${Environment}-DeleteEventFunctionName
  DeleteEventFunctionArn:
    Value: !GetAtt DeleteEventFunction.Arn
    Export:
      Name: !Sub ${ProjectName}-${Environment}-DeleteEventFunctionArn
  UpdateEventStatusFunctionName:
    Value: !Ref UpdateEventStatusFunction
    Export:
      Name: !Sub ${ProjectName}-${Environment}-UpdateEventStatusFunctionName
  UpdateEventStatusFunctionArn:
    Value: !GetAtt UpdateEventStatusFunction.Arn
    Export:
      Name: !Sub ${ProjectName}-${Environment}-UpdateEventStatusFunctionArn
  SchedulerGroupName:
    Value: !Ref SchedulerGroup
    Export:
      Name: !Sub ${ProjectName}-${Environment}-SchedulerGroupName
  SchedulerToNotificationsRoleArn:
    Value: !GetAtt SchedulerToNotificationsRole.Arn
    Export:
      Name: !Sub ${ProjectName}-${Environment}-SchedulerToNotificationsRoleArn